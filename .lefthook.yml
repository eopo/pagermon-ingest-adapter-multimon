# Lefthook configuration for PagerMon Ingest Adapter Multimon
# @see https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    lint-and-format:
      glob: "**/*.{js,mjs,json,md}"
      run: npx lint-staged --verbose
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit $GIT_PARAMS
