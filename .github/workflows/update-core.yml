name: Update Core Dependency

on:
  repository_dispatch:
    types: [core-updated]
  workflow_dispatch:
    inputs:
      core_version:
        description: 'Core version to update to (e.g., 1.0.5)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    concurrency:
      group: update-core-dependency
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Get core version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.core_version }}" ]; then
            VERSION="${{ github.event.inputs.core_version }}"
          else
            VERSION="${{ github.event.client_payload.core_version }}"
          fi
          # Remove 'v' prefix for npm
          NPM_VERSION="${VERSION#v}"
          echo "core_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "npm_version=${NPM_VERSION}" >> $GITHUB_OUTPUT
          echo "Updating to core version: ${VERSION} (npm: ${NPM_VERSION})"

      - name: Update core dependency
        run: |
          npm install @pagermon/ingest-core@${{ steps.version.outputs.npm_version }} --save-exact

      - name: Run tests
        run: npm test

      - name: Create Pull Request to dev
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          base: dev
          branch: bot/update-core-${{ steps.version.outputs.npm_version }}
          title: "fix(deps): update @pagermon/ingest-core to ${{ steps.version.outputs.core_version }}"
          commit-message: "fix(deps): update @pagermon/ingest-core to ${{ steps.version.outputs.core_version }}"
          body: |
            Automated core dependency update after ingest-core release.

            - Source release: `${{ steps.version.outputs.core_version }}`
            - Target branch: `dev`
            - Triggered by: `${{ github.event_name }}`
          labels: |
            dependencies
            automerge
          add-paths: |
            package.json
            package-lock.json
